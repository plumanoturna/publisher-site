<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started - Publisher Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #0a0a14;
            color: #e8e6e3;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container { max-width: 460px; width: 100%; }
        .logo { display: block; margin: 0 auto 1.5rem; width: 64px; height: auto; }
        h1 { font-size: 1.5rem; font-weight: 700; color: #fffdd0; text-align: center; margin-bottom: 0.5rem; }
        .subtitle { text-align: center; color: #a8a4a0; font-size: 0.9rem; font-weight: 400; margin-bottom: 2rem; }
        .card { background: #111122; border: 1px solid #1a1a2e; border-radius: 12px; padding: 2rem; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; font-size: 12px; font-weight: 700; color: #a8a4a0; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        .form-control { width: 100%; padding: 10px 14px; background: #0a0a14; color: #e8e6e3; border: 1px solid #1a1a2e; border-radius: 6px; font-family: 'Montserrat', sans-serif; font-size: 14px; outline: none; }
        .form-control:focus { border-color: #fffdd0; }
        select.form-control { cursor: pointer; }
        .btn { display: block; width: 100%; padding: 12px; background: #fffdd0; color: #0a0a14; border: none; border-radius: 25px; font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
        .btn:hover { opacity: 0.9; }
        .success { display: none; text-align: center; padding: 2rem 0; }
        .success svg { margin-bottom: 1rem; }
        .success h2 { color: #fffdd0; font-size: 1.2rem; margin-bottom: 0.5rem; }
        .success p { color: #a8a4a0; font-size: 0.9rem; font-weight: 400; line-height: 1.6; }
        .back-link { display: block; text-align: center; margin-top: 1.5rem; font-size: 0.8rem; color: #555; text-decoration: none; }
        .back-link:hover { color: #777; }
        .hint { font-size: 11px; color: #555; text-align: center; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <img src="/logo.png" alt="Publisher Platform" class="logo">
        <h1>Create Your Account</h1>
        <p class="subtitle">Start distributing content across 5 platforms today.</p>

        <div class="card">
            <form id="signup-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="form-control" placeholder="Your name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="plan">Plan</label>
                    <select id="plan" class="form-control">
                        <option value="starter">Starter (Free)</option>
                        <option value="pro">Pro ($29/mo)</option>
                        <option value="enterprise">Enterprise (Custom)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="channels">How many channels do you manage?</label>
                    <select id="channels" class="form-control">
                        <option value="1">1</option>
                        <option value="2-5">2-5</option>
                        <option value="6-10">6-10</option>
                        <option value="10+">10+</option>
                    </select>
                </div>
                <button type="submit" class="btn">Get Started</button>
            </form>
            <div class="success" id="success-msg">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                <h2>You're all set!</h2>
                <p>We'll send your account details to your email within 24 hours. Check your inbox for setup instructions.</p>
            </div>
        </div>
        <p class="hint">By signing up, you agree to our <a href="/terms-of-service.html" style="color: #777;">Terms</a> and <a href="/privacy-policy.html" style="color: #777;">Privacy Policy</a>.</p>
        <a href="/" class="back-link">&larr; Back to Publisher Platform</a>
    </div>
    <script>
    document.getElementById('signup-form').addEventListener('submit', function(e) {
        e.preventDefault();
        this.style.display = 'none';
        document.getElementById('success-msg').style.display = 'block';
    });
    // Pre-select plan from URL param
    var params = new URLSearchParams(window.location.search);
    if (params.get('plan')) {
        var sel = document.getElementById('plan');
        for (var i = 0; i < sel.options.length; i++) {
            if (sel.options[i].value === params.get('plan')) sel.selectedIndex = i;
        }
    }
    </script>
</body>
</html>
